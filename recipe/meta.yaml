{% set name = "rplibs" %}
{% set version = "6.9.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/brsynth/rplibs/archive/refs/tags/{{ version }}.tar.gz
  sha256: ede380de0090a00b648e4470f2c91870587c4450b4b40debd180c27c72f75b7e

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} setup.py install --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - pandas
    - networkx >=2.5
    - brs_utils >=1.26.0
    - filetype
    - chemlite
    - rr_cache
    - cobra

test:
  imports:
    - rplibs

about:
  home: https://github.com/brsynth/rplibs/tree/main
  summary: "Defines an enriched SBML structure with additional fields relative to RetroPath2 objects."
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - tduigou
    - ramez17khaled
    - breakthewall
